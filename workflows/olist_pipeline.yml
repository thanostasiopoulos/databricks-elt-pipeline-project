# Databricks Workflow — Olist ELT Pipeline
#
# Orchestrates the full Bronze → Silver → Gold pipeline for 3 representative
# months (2017-01, 2017-02, 2017-03) to demonstrate incremental ingestion.
#
# Design decisions:
#   - Single end-to-end pipeline (Bronze → Silver → Gold in one Workflow)
#   - Dimensions run once at the start — they are static full-overwrites
#     with no month dependency
#   - Facts run per month sequentially, each month gated on the previous
#   - Gold runs once after all months are complete
#   - Stop on first failure (default Databricks behaviour)
#
# Production note:
#   In a production setup this would be split into layer-scoped jobs with
#   watermark-driven month detection rather than a hardcoded month list.
#
# To import:
#   Databricks UI → Workflows → Create job → Edit as YAML → paste this file.

name: olist_elt_pipeline

tasks:

  # ── Dimensions (run once — static, no month dependency) ───────────────────────

  - task_key: silver_dim_customer
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/dim_customer
    timeout_seconds: 1800

  - task_key: silver_dim_seller
    depends_on:
      - task_key: silver_dim_customer
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/dim_seller
    timeout_seconds: 1800

  - task_key: silver_dim_product
    depends_on:
      - task_key: silver_dim_customer
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/dim_product
    timeout_seconds: 1800

  - task_key: silver_dim_date
    depends_on:
      - task_key: silver_dim_customer
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/dim_date
    timeout_seconds: 1800

  # ── Month 2017-01 ────────────────────────────────────────────────────────────

  - task_key: bronze_2017_01
    depends_on:
      - task_key: silver_dim_seller
      - task_key: silver_dim_product
      - task_key: silver_dim_date
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/bronze/ingest_raw
      base_parameters:
        ingestion_month: "2017-01"
    timeout_seconds: 1800

  - task_key: silver_fact_orders_2017_01
    depends_on:
      - task_key: bronze_2017_01
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_orders
      base_parameters:
        ingestion_month: "2017-01"
    timeout_seconds: 1800

  - task_key: silver_fact_order_items_2017_01
    depends_on:
      - task_key: silver_fact_orders_2017_01
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_order_items
      base_parameters:
        ingestion_month: "2017-01"
    timeout_seconds: 1800

  - task_key: silver_fact_reviews_2017_01
    depends_on:
      - task_key: silver_fact_orders_2017_01
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_reviews
      base_parameters:
        ingestion_month: "2017-01"
    timeout_seconds: 1800

  # ── Month 2017-02 ────────────────────────────────────────────────────────────

  - task_key: bronze_2017_02
    depends_on:
      - task_key: silver_fact_order_items_2017_01
      - task_key: silver_fact_reviews_2017_01
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/bronze/ingest_raw
      base_parameters:
        ingestion_month: "2017-02"
    timeout_seconds: 1800

  - task_key: silver_fact_orders_2017_02
    depends_on:
      - task_key: bronze_2017_02
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_orders
      base_parameters:
        ingestion_month: "2017-02"
    timeout_seconds: 1800

  - task_key: silver_fact_order_items_2017_02
    depends_on:
      - task_key: silver_fact_orders_2017_02
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_order_items
      base_parameters:
        ingestion_month: "2017-02"
    timeout_seconds: 1800

  - task_key: silver_fact_reviews_2017_02
    depends_on:
      - task_key: silver_fact_orders_2017_02
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_reviews
      base_parameters:
        ingestion_month: "2017-02"
    timeout_seconds: 1800

  # ── Month 2017-03 ────────────────────────────────────────────────────────────

  - task_key: bronze_2017_03
    depends_on:
      - task_key: silver_fact_order_items_2017_02
      - task_key: silver_fact_reviews_2017_02
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/bronze/ingest_raw
      base_parameters:
        ingestion_month: "2017-03"
    timeout_seconds: 1800

  - task_key: silver_fact_orders_2017_03
    depends_on:
      - task_key: bronze_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_orders
      base_parameters:
        ingestion_month: "2017-03"
    timeout_seconds: 1800

  - task_key: silver_fact_order_items_2017_03
    depends_on:
      - task_key: silver_fact_orders_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_order_items
      base_parameters:
        ingestion_month: "2017-03"
    timeout_seconds: 1800

  - task_key: silver_fact_reviews_2017_03
    depends_on:
      - task_key: silver_fact_orders_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/silver/fact_reviews
      base_parameters:
        ingestion_month: "2017-03"
    timeout_seconds: 1800

  # ── Gold Layer (runs once after all months complete) ──────────────────────────

  - task_key: gold_gmv_monthly
    depends_on:
      - task_key: silver_fact_order_items_2017_03
      - task_key: silver_fact_reviews_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/gold/gld_gmv_monthly
    timeout_seconds: 1800

  - task_key: gold_delivery_performance
    depends_on:
      - task_key: silver_fact_order_items_2017_03
      - task_key: silver_fact_reviews_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/gold/gld_delivery_performance
    timeout_seconds: 1800

  - task_key: gold_seller_scorecard
    depends_on:
      - task_key: silver_fact_order_items_2017_03
      - task_key: silver_fact_reviews_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/gold/gld_seller_scorecard
    timeout_seconds: 1800

  - task_key: gold_review_summary
    depends_on:
      - task_key: silver_fact_order_items_2017_03
      - task_key: silver_fact_reviews_2017_03
    notebook_task:
      notebook_path: /Workspace/Users/thanos.tasiopoulos@gmail.com/databricks-elt-pipeline-project/notebooks/gold/gld_review_summary
    timeout_seconds: 1800
